<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiew Reunion 2026</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23EFEBE2'/%3E%3Ctext x='32' y='45' font-family='Georgia, serif' font-style='italic' font-size='36' text-anchor='middle' fill='%23211D19'%3EC%3C/text%3E%3C/svg%3E">
<style>
  :root {
    /* ---- placeholder tokens — swap these five once the brand guide lands; everything below reads from them ---- */
    --paper: #EFEBE2;
    --ink: #211D19;
    --accent: #2B5D5A;
    --accent-soft: #DCE5DF;
    --line: rgba(43, 93, 90, 0.22);
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .frame-rule { border: 0; border-top: 1px solid var(--line); }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .kicker {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.03em;
    padding: 1.1rem 1rem;
    color: var(--accent);
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 4rem;
  }
  .hero {
    text-align: center;
    max-width: 38rem;
    margin-bottom: 3.5rem;
    animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    margin: 0 0 0.6rem;
    letter-spacing: -0.01em;
  }
  .hero p { margin: 0; font-size: 1rem; opacity: 0.72; }
  nav.routes { width: 100%; max-width: 34rem; display: flex; flex-direction: column; }
  nav.routes a {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    padding: 1.3rem 0.25rem;
    border-top: 1px solid var(--line);
    text-decoration: none;
    color: inherit;
    animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  nav.routes a:nth-child(1) { animation-delay: 0.25s; }
  nav.routes a:nth-child(2) { animation-delay: 0.34s; }
  nav.routes a:nth-child(3) { animation-delay: 0.43s; }
  nav.routes a:last-child { border-bottom: 1px solid var(--line); }
  nav.routes a:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1rem;
    color: var(--accent);
    opacity: 0.65;
    width: 1.6rem;
    flex-shrink: 0;
  }
  .route-body { flex: 1; }
  .route-title {
    font-family: var(--serif);
    font-size: 1.3rem;
    margin: 0 0 0.2rem;
    display: inline-block;
    background-image: linear-gradient(var(--accent), var(--accent));
    background-repeat: no-repeat;
    background-position: 0 100%;
    background-size: 0% 1px;
    transition: background-size 0.25s ease;
  }
  nav.routes a:hover .route-title,
  nav.routes a:focus-visible .route-title { background-size: 100% 1px; }
  .route-desc { font-size: 0.92rem; opacity: 0.66; margin: 0; }
  .route-arrow { font-size: 1.1rem; opacity: 0.45; align-self: center; transition: transform 0.2s ease; }
  nav.routes a:hover .route-arrow,
  nav.routes a:focus-visible .route-arrow { transform: translateX(3px); }
  @media (prefers-reduced-motion: reduce) {
    .hero, nav.routes a { animation: none; opacity: 1; transform: none; }
  }
  @media (max-width: 30rem) {
    .num { display: none; }
  }
</style>
</head>
<body>

<main>
  <div class="hero">
    <h1>Chiew Reunion 2026</h1>
    <p>August 8–9 · Pearl Farm Beach Resort, Samal Island, Davao</p>
  </div>

  <nav class="routes" aria-label="Reunion sites">
    <a href="https://jnpkwan.github.io/Victories_2026/" target="_blank" rel="noopener">
      <span class="num">01</span>
      <span class="route-body">
        <p class="route-title">What's <em>Chiew?</em></p>
        <p class="route-desc">Share your news for 2025 to now</p>
      </span>
      <span class="route-arrow">↗</span>
    </a>
    <a href="https://jnpkwan.github.io/Pictorial_2026/" target="_blank" rel="noopener">
      <span class="num">02</span>
      <span class="route-body">
        <p class="route-title">Pictorial Sign-Up</p>
        <p class="route-desc">Book your family photo slot</p>
      </span>
      <span class="route-arrow">↗</span>
    </a>
    <a href="https://jnpkwan.github.io/Chiewmba_2026/" target="_blank" rel="noopener">
      <span class="num">03</span>
      <span class="route-body">
        <p class="route-title">Chiew<em>mba</em></p>
        <p class="route-desc">Practice the dance before you arrive</p>
      </span>
      <span class="route-arrow">↗</span>
    </a>
  </nav>
</main>

<hr class="frame-rule">
<div class="kicker">One island. One weekend. Every Chiew.</div>

</body>
</html>
